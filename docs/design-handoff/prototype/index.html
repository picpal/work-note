<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkNote</title>
  <!-- restore theme before paint to avoid flash -->
  <script>
    try {
      var m = localStorage.getItem("wn.theme");
      document.documentElement.setAttribute("data-theme", m === "dark" ? "dark" : "light");
    } catch (e) {}
  </script>

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />

  <!-- vendor: React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- vendor: markdown / highlight / mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>

  <!-- CodeMirror 6 (ESM) — import map dedupes the singleton packages -->
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.2",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.36.4?external=@codemirror/state",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.8?external=@codemirror/state,@codemirror/view,@lezer/common,@lezer/highlight,@lezer/lr",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.8.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@lezer/common",
      "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6.3.2?external=@codemirror/state,@codemirror/view,@codemirror/language,@lezer/common,@lezer/markdown,@lezer/highlight",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.18.6?external=@codemirror/state,@codemirror/view,@codemirror/language,@lezer/common",
      "@codemirror/lang-sql": "https://esm.sh/@codemirror/lang-sql@6.8.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/autocomplete,@lezer/common,@lezer/highlight,@lezer/lr",
      "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.3?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/autocomplete,@lezer/common,@lezer/highlight,@lezer/lr",
      "@codemirror/lang-java": "https://esm.sh/@codemirror/lang-java@6.0.1?external=@codemirror/state,@codemirror/view,@codemirror/language,@lezer/common,@lezer/highlight,@lezer/lr",
      "@codemirror/legacy-modes/mode/shell": "https://esm.sh/@codemirror/legacy-modes@6.5.1/mode/shell?external=@codemirror/state,@codemirror/language,@lezer/common,@lezer/highlight",
      "@lezer/common": "https://esm.sh/@lezer/common@1.2.3",
      "@lezer/highlight": "https://esm.sh/@lezer/highlight@1.2.1?external=@lezer/common",
      "@lezer/markdown": "https://esm.sh/@lezer/markdown@1.3.2?external=@lezer/common,@lezer/highlight",
      "@lezer/lr": "https://esm.sh/@lezer/lr@1.4.2?external=@lezer/common"
    }
  }
  </script>
  <script type="module" src="cm.js?v=3"></script>
</head>
<body>
  <div id="root"></div>

  <!-- plain modules -->
  <script src="data.js"></script>
  <script src="treeutil.js"></script>
  <script src="md.js"></script>
  <script src="export.js"></script>

  <!-- react modules (each attaches to window) -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="hooks.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ContextMenu.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Editor.jsx?v=3"></script>
  <script type="text/babel" src="Outline.jsx"></script>
  <script type="text/babel" src="SearchModal.jsx"></script>
  <script type="text/babel" src="Profile.jsx"></script>
  <script type="text/babel" src="App.jsx?v=3"></script>

  <!-- mount -->
  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.App));
  </script>
</body>
</html>
